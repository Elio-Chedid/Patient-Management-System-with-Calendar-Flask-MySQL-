<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Add New Cost</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">🩺 PhysioWay</a>
    <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
  </div>
</nav>

<div class="container">
  <h1 class="mb-4 text-dark">Add New Cost</h1>
  <form method="POST" action="{{ url_for('add_expense') }}">
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="3"
                placeholder="What was the money spent on?" required></textarea>
    </div>
    <div class="row mb-3">
      <div class="col">
        <label class="form-label">Amount ($)</label>
        <input type="number" step="0.01" name="amount" class="form-control" required>
      </div>
      <div class="col">
        <label class="form-label">Date</label>
        <input type="date" name="expense_date" class="form-control"
               value="{{ today }}" required>
      </div>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-dark">Save Cost</button>
      <a href="{{ url_for('expenses') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
</body>
</html>
