<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Add New Patient</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">🩺 PhysioWay</a>
    <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
  </div>
</nav>

<div class="container">
  <h1 class="mb-4 text-success">Add New Patient</h1>

  <form method="POST" action="{{ url_for('add_new') }}">

    {% if session.role=='admin' %}
    <div class="mb-3">
      <label class="form-label">Assign to Doctor</label>
      <select name="doctor_id" class="form-select">
        <option value="">— Unassigned —</option>
        {% for doc in doctors %}
          <option value="{{ doc[0] }}">{{ doc[1] }}</option>
        {% endfor %}
      </select>
    </div>
    {% endif %}

    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" name="name" class="form-control" placeholder="Enter name">
    </div>
    <div class="mb-3">
      <label class="form-label">Details</label>
      <textarea name="details" class="form-control" rows="3"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Case Type</label>
      <input type="text" name="casetype" class="form-control">
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="3"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">First Session</label>
      <input type="datetime-local" name="firstsession" class="form-control">
    </div>

    <div class="mb-4">
      <label class="form-label">Next Sessions</label>
      <div id="nextSessions">
        <input type="datetime-local" name="nextsession[]" class="form-control mb-2">
      </div>
      <button type="button" class="btn btn-sm btn-outline-primary"
              onclick="addNS()">+ Add Next Session</button>
    </div>

    <div class="mb-3">
      <label class="form-label">Total Fees</label>
      <input type="number" step="0.01" name="totalfees" class="form-control">
    </div>

    <div class="card mb-4">
      <div class="card-header bg-success text-white">Initial Payment (optional)</div>
      <div class="card-body row">
        <div class="col">
          <label class="form-label">Amount</label>
          <input type="number" step="0.01" name="initial_payment"
                 class="form-control" value="0">
        </div>
        <div class="col">
          <label class="form-label">Date</label>
          <input type="date" name="payment_date" class="form-control"
                 value="{{ today }}">
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-success">Add Patient</button>
  </form>
</div>

<script>
function addNS(){
  const i=document.createElement("input");
  i.type="datetime-local"; i.name="nextsession[]";
  i.className="form-control mb-2";
  document.getElementById("nextSessions").appendChild(i);
}
</script>
</body>
</html>
