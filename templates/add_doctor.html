<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Add Doctor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">🩺 PhysioWay</a>
    <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
  </div>
</nav>

<div class="container">
  <h1 class="mb-4 text-success">Add New Doctor</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('add_doctor') }}">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="full_name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control"
             required minlength="4">
    </div>
    <div class="mb-4">
      <label class="form-label">Role</label>
      <select name="role" class="form-select">
        <option value="doctor" selected>Doctor</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-success">Create Doctor</button>
      <a href="{{ url_for('manage_doctors') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
